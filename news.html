<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お知らせ一覧 | 渋沢連合自治会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --mint:#4ecb8d;--mint-l:#e8faf2;--mint-d:#2ea86b;
  --coral:#ff6b6b;--coral-l:#fff0f0;
  --sky:#4dabf7;--sky-l:#e8f4ff;
  --amber:#ffd43b;--amber-l:#fff9db;
  --lavender:#b197fc;--lavender-l:#f3f0ff;
  --text:#1a1a2e;--text2:#4a4a6a;--text3:#8888aa;
  --bg:#f8f9fe;--white:#fff;--border:#e8e8f0;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;}
a{text-decoration:none;color:inherit;}

/* 背景バルーン */
.bg-balloons{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.balloon{position:absolute;border-radius:50%;opacity:.15;animation:balloonDrift linear infinite;filter:blur(1px);}
.b1{width:180px;height:180px;background:radial-gradient(circle,var(--mint),var(--sky));top:8%;left:2%;animation-duration:22s;}
.b2{width:120px;height:120px;background:radial-gradient(circle,var(--coral),#ffa94d);top:20%;right:4%;animation-duration:28s;animation-delay:-5s;}
.b3{width:90px;height:90px;background:radial-gradient(circle,var(--amber),#ffe066);top:60%;left:1%;animation-duration:20s;animation-delay:-8s;}
.b4{width:150px;height:150px;background:radial-gradient(circle,var(--lavender),var(--sky));top:70%;right:2%;animation-duration:25s;animation-delay:-12s;}
@keyframes balloonDrift{
  0%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-24px) scale(1.03);}
  100%{transform:translateY(0) scale(1);}
}

/* HEADER */
header{background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.06);}
.header-inner{max-width:800px;margin:0 auto;padding:0 24px;height:62px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-img{width:40px;height:40px;border-radius:10px;object-fit:cover;box-shadow:0 3px 10px rgba(78,203,141,.3);}
.logo-pref{font-size:10px;color:var(--text3);}
.logo-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--text);}
.back-btn{margin-left:auto;font-size:12px;font-weight:700;color:var(--mint-d);display:flex;align-items:center;gap:4px;padding:7px 14px;border-radius:20px;background:var(--mint-l);transition:background .2s;}
.back-btn:hover{background:var(--mint);color:#fff;}

/* MAIN */
.main{max-width:800px;margin:40px auto;padding:0 24px;position:relative;z-index:1;}
.page-title{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.page-divider{width:48px;height:3px;background:linear-gradient(90deg,var(--mint),var(--sky));border-radius:2px;margin-bottom:28px;}

/* フィルター */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:var(--mint);border-color:var(--mint);color:#fff;}

/* お知らせリスト */
.notice-list{display:flex;flex-direction:column;gap:12px;}
.notice-item{
  background:#fff;border-radius:var(--r);
  border:2px solid var(--border);
  display:flex;align-items:stretch;
  text-decoration:none;color:inherit;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  transition:transform .2s,box-shadow .2s,border-color .2s;
  overflow:hidden;
}
.notice-item:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(78,203,141,.15);border-color:var(--mint);}
.notice-left{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 16px;width:96px;background:var(--bg);border-right:2px solid var(--border);flex-shrink:0;}.notice-day{font-size:26px;font-weight:900;color:var(--mint-d);line-height:1;}
.notice-month{font-size:10px;color:var(--text3);font-weight:500;}
.n-badge{font-size:10px;padding:3px 0;border-radius:20px;font-weight:700;white-space:nowrap;width:68px;text-align:center;display:inline-block;}
.nb-new{background:linear-gradient(135deg,var(--mint),var(--mint-d));color:#fff;}
.nb-info{background:linear-gradient(135deg,var(--sky),#1971c2);color:#fff;}
.nb-kairan{background:var(--mint-l);color:var(--mint-d);border:1px solid var(--mint);}
.nb-event{background:linear-gradient(135deg,var(--coral),#c0392b);color:#fff;}
.nb-topics{background:linear-gradient(135deg,var(--lavender),#7950f2);color:#fff;}
.notice-body{flex:1;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.notice-content{flex:1;}
.notice-title{font-size:15px;font-weight:700;line-height:1.6;color:var(--text);margin-bottom:4px;}
.notice-desc{font-size:12px;color:var(--text3);}
.notice-thumb{
  width:72px;height:54px;border-radius:8px;
  object-fit:cover;flex-shrink:0;
  background:var(--mint-l);
}
.notice-arr{color:var(--border);font-size:18px;flex-shrink:0;transition:color .2s,transform .2s;}
.notice-item:hover .notice-arr{color:var(--mint);transform:translateX(4px);}

/* ローディング */
.loading{text-align:center;padding:60px 20px;color:var(--text3);}
.loading-spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--mint);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* 空状態 */
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}

/* フッター */
footer{background:linear-gradient(160deg,#1a2340,#1e2b4a);padding:28px 24px;margin-top:60px;text-align:center;position:relative;z-index:1;}
.footer-back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;padding:10px 24px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);transition:all .2s;margin-bottom:16px;}
.footer-back:hover{color:#fff;border-color:rgba(255,255,255,.5);}
.footer-copy{font-size:11px;color:rgba(255,255,255,.3);}
</style>
</head>

<div class="main">
  <h1 class="page-title">お知らせ一覧</h1>
  <p class="page-sub">渋沢連合自治会からのお知らせ・回覧板・イベント情報です。</p>
  <div class="page-divider"></div>

  <!-- フィルター -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="お知らせ">お知らせ</button>
    <button class="filter-btn" data-filter="回覧">回覧</button>
    <button class="filter-btn" data-filter="イベント">イベント</button>
    <button class="filter-btn" data-filter="NEW">NEW</button>
    <button class="filter-btn" data-filter="トピックス">トピックス</button>
  </div>

  <!-- お知らせリスト -->
  <div class="notice-list" id="notice-list">
    <div class="loading">
      <div class="loading-spinner"></div>
      読み込み中...
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxPfmeo3zuEohAdfTuX2OkNh0UV_SNW1JICeIOYNKknLR6YgGoA_ais9QGGhEhdWGK2uw/exec';
const BADGE_MAP = {'NEW':'nb-new','お知らせ':'nb-info','回覧':'nb-kairan','イベント':'nb-event','トピックス':'nb-topics'};

let allNews = [];
const initFilter = new URLSearchParams(window.location.search).get('filter');
let currentFilter = initFilter || 'all';

async function loadNews() {
  try {
    const res = await fetch(GAS_URL + '?type=news');
    const data = await res.json();
    allNews = data.news || [];
    renderNews();
  } catch(e) {
    document.getElementById('notice-list').innerHTML =
      '<div class="empty">お知らせの読み込みに失敗しました。<br>しばらくしてから再度お試しください。</div>';
  }
}

function renderNews() {
  const list = document.getElementById('notice-list');
  const filtered = currentFilter === 'all'
    ? allNews
    : allNews.filter(n => n.badge === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当するお知らせはありません。</div>';
    return;
  }

  list.innerHTML = filtered.map(item => {
    const bc = BADGE_MAP[item.badge] || 'nb-info';
    const thumb = item.imageUrl
      ? `<img class="notice-thumb" src="${item.imageUrl}" alt="" loading="lazy"
           onerror="this.style.display='none'">`
      : '';
    const target = item.url && item.url !== '#' ? 'target="_blank" rel="noopener"' : '';
    return `
      <a class="notice-item" href="${item.url || '#'}" ${target}>
        <div class="notice-left">
          <div class="notice-day">${item.day}</div>
          <div class="notice-month">${item.month}</div>
          <span class="n-badge ${bc}">${item.badge}</span>
        </div>
        <div class="notice-body">
          <div class="notice-content">
            <div class="notice-title">${item.title}</div>
            ${item.description ? `<div class="notice-desc">${item.description}</div>` : ''}
          </div>
          ${thumb}
          <div class="notice-arr">›</div>
        </div>
      </a>`;
  }).join('');
}

// フィルター
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderNews();
  });
});

// URLパラメーターからフィルターを取得（loadNewsより先に設定）
const urlParams = new URLSearchParams(window.location.search);
const urlFilter = urlParams.get('filter');
if (urlFilter) {
  currentFilter = urlFilter;
  // フィルターボタンのアクティブ状態を更新
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.filter === urlFilter) btn.classList.add('active');
  });
}

loadNews();
</script>
