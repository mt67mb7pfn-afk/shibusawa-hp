<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トピックス一覧 | 渋沢連合自治会</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --mint:#4ecb8d;--mint-l:#e8faf2;--mint-d:#2ea86b;
  --coral:#ff6b6b;--coral-l:#fff0f0;
  --sky:#4dabf7;--sky-l:#e8f4ff;
  --amber:#ffd43b;--amber-l:#fff9db;
  --lavender:#b197fc;--lavender-l:#f3f0ff;
  --text:#1a1a2e;--text2:#4a4a6a;--text3:#8888aa;
  --bg:#f8f9fe;--white:#fff;--border:#e8e8f0;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;}
a{text-decoration:none;color:inherit;}

/* 背景バルーン */
.bg-balloons{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.balloon{position:absolute;border-radius:50%;opacity:.15;animation:balloonDrift linear infinite;filter:blur(1px);}
.b1{width:180px;height:180px;background:radial-gradient(circle,var(--coral),var(--lavender));top:8%;left:2%;animation-duration:22s;}
.b2{width:120px;height:120px;background:radial-gradient(circle,var(--lavender),var(--sky));top:20%;right:4%;animation-duration:28s;animation-delay:-5s;}
.b3{width:90px;height:90px;background:radial-gradient(circle,var(--amber),#ffe066);top:60%;left:1%;animation-duration:20s;animation-delay:-8s;}
.b4{width:150px;height:150px;background:radial-gradient(circle,var(--coral),var(--mint));top:70%;right:2%;animation-duration:25s;animation-delay:-12s;}
@keyframes balloonDrift{
  0%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-24px) scale(1.03);}
  100%{transform:translateY(0) scale(1);}
}

/* HEADER */
header{background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.06);}
.header-inner{max-width:1080px;margin:0 auto;padding:0 24px;height:62px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-pref{font-size:10px;color:var(--text3);}
.logo-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--text);}
.back-btn{margin-left:auto;font-size:12px;font-weight:700;color:var(--coral);display:flex;align-items:center;gap:4px;padding:7px 14px;border-radius:20px;background:var(--coral-l);transition:background .2s;}
.back-btn:hover{background:var(--coral);color:#fff;}

/* MAIN */
.main{max-width:1080px;margin:40px auto;padding:0 24px;position:relative;z-index:1;}
.page-title{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:16px;}
.page-divider{width:48px;height:3px;background:linear-gradient(90deg,var(--coral),var(--lavender));border-radius:2px;margin-bottom:28px;}

/* フィルター */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.filter-btn{font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:linear-gradient(135deg,var(--coral),var(--lavender));border-color:transparent;color:#fff;}

/* カウント */
.result-count{font-size:12px;color:var(--text3);margin-bottom:16px;}
.result-count span{font-weight:700;color:var(--text2);}

/* フォトグリッド */
.photo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}
@media(max-width:600px){
  .photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
}

.photo-card{
  background:#fff;
  border-radius:16px;
  border:2px solid var(--border);
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  transition:transform .2s,box-shadow .2s,border-color .2s;
  display:flex;
  flex-direction:column;
}
.photo-card:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(255,107,107,.15);
  border-color:var(--coral);
}
.photo-card-img{
  width:100%;
  aspect-ratio:4/3;
  overflow:hidden;
  background:var(--coral-l);
  position:relative;
}
.photo-card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .3s;
}
.photo-card:hover .photo-card-img img{
  transform:scale(1.05);
}
.photo-card-img .no-image{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:var(--border);
}
.photo-card-body{
  padding:14px 16px;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.photo-card-cat{
  display:inline-block;
  font-size:10px;
  font-weight:700;
  padding:3px 10px;
  border-radius:20px;
  background:linear-gradient(135deg,var(--coral),var(--lavender));
  color:#fff;
  width:fit-content;
}
.photo-card-title{
  font-size:13px;
  font-weight:700;
  color:var(--text);
  line-height:1.5;
}
.photo-card-sub{
  font-size:11px;
  color:var(--text3);
  line-height:1.5;
}
.photo-card-link{
  margin-top:auto;
  font-size:11px;
  color:var(--coral);
  font-weight:700;
  display:flex;
  align-items:center;
  gap:4px;
}

/* ローディング */
.loading{text-align:center;padding:80px 20px;color:var(--text3);}
.loading-spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--coral);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* 空状態 */
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}

/* フッター */
footer{background:linear-gradient(160deg,#1a2340,#1e2b4a);padding:28px 24px;margin-top:60px;text-align:center;position:relative;z-index:1;}
.footer-back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;padding:10px 24px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);transition:all .2s;margin-bottom:16px;}
.footer-back:hover{color:#fff;border-color:rgba(255,255,255,.5);}
.footer-copy{font-size:11px;color:rgba(255,255,255,.3);}
</style>
</head>
<body>

<div class="bg-balloons">
  <div class="balloon b1"></div><div class="balloon b2"></div>
  <div class="balloon b3"></div><div class="balloon b4"></div>
</div>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">
      <div><div class="logo-pref">横浜市都筑区</div><div class="logo-name">渋沢連合自治会</div></div>
    </a>
    <a class="back-btn" href="index.html">← トップに戻る</a>
  </div>
</header>

<div class="main">
  <h1 class="page-title">トピックス一覧</h1>
  <p class="page-sub">渋沢連合自治会の地域活動・行事の写真や話題をお届けします。</p>
  <div class="page-divider"></div>

  <!-- フィルター -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all">すべて</button>
  </div>

  <!-- 件数 -->
  <div class="result-count" id="result-count"></div>

  <!-- フォトグリッド -->
  <div class="photo-grid" id="photo-grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="loading-spinner"></div>
      読み込み中...
    </div>
  </div>
</div>

<footer>
  <a class="footer-back" href="index.html">← トップページに戻る</a>
  <div class="footer-copy">© Shibusawa Rengo Jichikai All Rights Reserved.</div>
</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxPfmeo3zuEohAdfTuX2OkNh0UV_SNW1JICeIOYNKknLR6YgGoA_ais9QGGhEhdWGK2uw/exec';

let allPhotos = [];
let currentFilter = 'all';

// URLパラメーターからフィルターを取得
const urlParams = new URLSearchParams(window.location.search);
const urlFilter = urlParams.get('filter');
if (urlFilter) currentFilter = urlFilter;

async function loadPhotos() {
  try {
    const res = await fetch(GAS_URL + '?type=photos');
    const data = await res.json();
    allPhotos = data.photos || [];
    buildFilterButtons();
    renderPhotos();
  } catch(e) {
    document.getElementById('photo-grid').innerHTML =
      '<div class="empty" style="grid-column:1/-1">データの読み込みに失敗しました。<br>しばらくしてから再度お試しください。</div>';
  }
}

function buildFilterButtons() {
  // カテゴリ一覧を取得（重複除去）
  const categories = [...new Set(allPhotos.map(p => p.category).filter(Boolean))];
  const bar = document.getElementById('filter-bar');

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = cat;
    btn.textContent = cat;
    if (cat === currentFilter) {
      btn.classList.add('active');
      // 「すべて」ボタンのactiveを外す
      bar.querySelector('[data-filter="all"]').classList.remove('active');
    }
    bar.appendChild(btn);
  });

  // フィルターボタンのイベント
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderPhotos();
    });
  });
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  const countEl = document.getElementById('result-count');

  const filtered = currentFilter === 'all'
    ? allPhotos
    : allPhotos.filter(p => p.category === currentFilter);

  countEl.innerHTML = `<span>${filtered.length}</span> 件`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">該当する写真はありません。</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const imgHtml = item.imageUrl
      ? `<img src="${item.imageUrl}" alt="${item.title||item.category}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>📷</div>'">`
      : `<div class="no-image">📷</div>`;

    const linkHtml = item.url && item.url !== '#'
      ? `<div class="photo-card-link">詳細を見る ›</div>`
      : '';

    const cardTag = item.url && item.url !== '#'
      ? `<a class="photo-card" href="${item.url}" target="_blank" rel="noopener">`
      : `<div class="photo-card">`;
    const cardClose = item.url && item.url !== '#' ? `</a>` : `</div>`;

    return `
      ${cardTag}
        <div class="photo-card-img">${imgHtml}</div>
        <div class="photo-card-body">
          <div class="photo-card-cat">${item.category}</div>
          ${item.title ? `<div class="photo-card-title">${item.title}</div>` : ''}
          ${item.sub ? `<div class="photo-card-sub">${item.sub}</div>` : ''}
          ${linkHtml}
        </div>
      ${cardClose}`;
  }).join('');
}

loadPhotos();
</script>
</body>
</html>
